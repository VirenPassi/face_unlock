name: Face Unlock Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision facenet-pytorch numpy opencv-python pillow pyautogui pyinstaller

    - name: Download model weights
      run: |
        mkdir -p models
        curl -o models/20180402-114759-vggface2.pt https://github.com/timesler/facenet-pytorch/raw/master/weights/20180402-114759-vggface2.pt

    - name: Verify model loads
      run: |
        python -c "
        import torch
        from facenet_pytorch import InceptionResnetV1
        model = InceptionResnetV1(pretrained=None, classify=False)
        model.load_state_dict(torch.load('models/20180402-114759-vggface2.pt', map_location='cpu'), strict=False)
        print('[CHECK] Model loaded successfully')
        "

    - name: Build executable
      run: |
        pyinstaller face_unlock.py ^
          --onefile ^
          --hidden-import=facenet_pytorch ^
          --hidden-import=facenet_pytorch.models.mtcnn ^
          --hidden-import=facenet_pytorch.models.inception_resnet_v1 ^
          --add-data "known_faces;known_faces" ^
          --add-data "models/20180402-114759-vggface2.pt;models"

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: face-unlock
        path: dist/face_unlock.exe
        if-no-files-found: error
